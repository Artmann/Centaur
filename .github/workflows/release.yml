name: Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    name: Build Windows (win-x64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish self-contained single-file
        shell: pwsh
        run: |
          dotnet publish src/Centaur.App/Centaur.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/win-x64

      - name: Rename exe with version
        shell: pwsh
        run: |
          $exe = "Centaur-${{ steps.ver.outputs.version }}-win-x64.exe"
          Move-Item publish/win-x64/Centaur.App.exe $exe
          "asset=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pkg

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.pkg.outputs.asset }}
